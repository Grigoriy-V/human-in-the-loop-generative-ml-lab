name: cifar10
output_dir: outputs/cifar10
seed: 123
data:
  dataset: cifar10
  root: datasets
  mirror_url: https://data.brainchip.com/dataset-mirror/cifar10/cifar-10-python.tar.gz
  resolution: 32
  num_classes: 10
  batch_size: 128
  num_workers: 4
model:
  base_channels: 88
  channel_mults: [1, 2, 2, 4]
  num_res_blocks: 2
  attention_resolutions: [8]
  dropout: 0.1
  class_cond: true
  cond_drop_prob: 0.1
  num_heads: 1
diffusion:
  steps: 1000
  schedule: cosine
train:
  max_steps: 200000
  learning_rate: 0.0002
  weight_decay: 0.01
  grad_accum_steps: 1
  grad_clip: 1.0
  ema_decay: 0.9999
  dtype: bf16
  log_every: 50
  save_every: 2000
  sample_every: 2000
  sample_count: 16
