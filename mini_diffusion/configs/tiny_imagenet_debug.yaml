name: tiny_imagenet_debug
output_dir: outputs/tiny_imagenet_debug
seed: 123
data:
  dataset: tiny_imagenet
  root: datasets/tiny-imagenet-200
  resolution: 64
  num_classes: 200
  batch_size: 4
  num_workers: 0
model:
  base_channels: 16
  channel_mults: [1, 2, 2]
  num_res_blocks: 1
  attention_resolutions: [16]
  dropout: 0.0
  class_cond: true
  cond_drop_prob: 0.1
  num_heads: 1
diffusion:
  steps: 8
  schedule: linear
train:
  max_steps: 4
  learning_rate: 0.0002
  weight_decay: 0.0
  grad_accum_steps: 1
  grad_clip: 1.0
  ema_decay: 0.995
  dtype: bf16
  log_every: 1
  save_every: 2
  sample_every: 2
  sample_count: 4
