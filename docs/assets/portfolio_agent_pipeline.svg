<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="475" viewBox="0 0 1400 475" role="img"><style>text{font-family:Arial,Helvetica,sans-serif}.title{font-size:28px;font-weight:700;fill:#102A43}.sub{font-size:16px;fill:#627D98}.label{font-size:16px;fill:#243B53}.small{font-size:13px;fill:#627D98}.bold{font-weight:700}</style><rect width="100%" height="100%" fill="#FFFFFF"/><text x="65" y="52" class="title">Human-supervised agent workflow</text><text x="65" y="80" class="sub">Agents execute bounded tasks; the human retains authority over direction and long training/evaluation.</text><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#627D98"/></marker></defs><rect x="65" y="155" width="190" height="96" rx="12" fill="#FFFFFF" stroke="#247BA0" stroke-width="3"/><text x="160.0" y="190" text-anchor="middle" class="label bold">Human / user</text><text x="160.0" y="216" text-anchor="middle" class="small">approves direction</text><text x="160.0" y="235" text-anchor="middle" class="small">and long runs</text><path d="M263 203 H305" stroke="#627D98" stroke-width="3" marker-end="url(#arrow)"/><rect x="315" y="155" width="220" height="96" rx="12" fill="#FFFFFF" stroke="#102A43" stroke-width="3"/><text x="425.0" y="190" text-anchor="middle" class="label bold">Root supervisor</text><text x="425.0" y="216" text-anchor="middle" class="small">roadmap · task spec</text><text x="425.0" y="235" text-anchor="middle" class="small">review · decision</text><path d="M543 203 H585" stroke="#627D98" stroke-width="3" marker-end="url(#arrow)"/><rect x="595" y="155" width="245" height="96" rx="12" fill="#FFFFFF" stroke="#2A9D8F" stroke-width="3"/><text x="717.5" y="190" text-anchor="middle" class="label bold">Role routing</text><text x="717.5" y="216" text-anchor="middle" class="small">Luna: clerical · Terra: routine</text><text x="717.5" y="235" text-anchor="middle" class="small">Sol: explicit high-risk approval</text><path d="M848 203 H890" stroke="#627D98" stroke-width="3" marker-end="url(#arrow)"/><rect x="900" y="155" width="220" height="96" rx="12" fill="#FFFFFF" stroke="#F4A261" stroke-width="3"/><text x="1010.0" y="190" text-anchor="middle" class="label bold">Bounded work</text><text x="1010.0" y="216" text-anchor="middle" class="small">implementation / validation</text><text x="1010.0" y="235" text-anchor="middle" class="small">manual long-run gate</text><path d="M1128 203 H1170" stroke="#627D98" stroke-width="3" marker-end="url(#arrow)"/><rect x="1180" y="155" width="160" height="96" rx="12" fill="#FFFFFF" stroke="#2F855A" stroke-width="3"/><text x="1260.0" y="190" text-anchor="middle" class="label bold">Evidence</text><text x="1260.0" y="216" text-anchor="middle" class="small">tests / evaluator</text><text x="1260.0" y="235" text-anchor="middle" class="small">artifacts</text><path d="M1260 260 V325 H425 V260" fill="none" stroke="#627D98" stroke-width="3" marker-end="url(#arrow)"/><rect x="315" y="335" width="440" height="92" rx="12" fill="#F0F4F8" stroke="#9FB3C8"/><text x="535" y="370" text-anchor="middle" class="label bold">Append-only audit trail</text><text x="535" y="397" text-anchor="middle" class="small">experiment ledger: material ML operations · agent ledger: lifecycle + review</text><rect x="810" y="335" width="530" height="92" rx="12" fill="#FFF7ED" stroke="#F4A261"/><text x="1075" y="370" text-anchor="middle" class="label bold">Manual gate is a control, not a footnote</text><text x="1075" y="397" text-anchor="middle" class="small">Long training/evaluation is prepared by agents and launched only by the human.</text></svg>