<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="540" viewBox="0 0 1400 540" role="img"><style>text{font-family:Arial,Helvetica,sans-serif}.title{font-size:28px;font-weight:700;fill:#102A43}.sub{font-size:16px;fill:#627D98}.label{font-size:16px;fill:#243B53}.small{font-size:13px;fill:#627D98}.bold{font-weight:700}</style><rect width="100%" height="100%" fill="#FFFFFF"/><text x="70" y="55" class="title">ML progression: from pixel diffusion to controlled model selection</text><text x="70" y="85" class="sub">Learning milestones are intentionally labelled where evidence is partial, cross-step, or quick-protocol.</text><line x1="130" y1="210" x2="1270" y2="210" stroke="#BCCCDC" stroke-width="6" stroke-linecap="round"/><path d="M127 210 H308" stroke="#9FB3C8" stroke-width="3" marker-end="url(#arrow)"/><circle cx="85" cy="210" r="31" fill="#247BA0"/><text x="85" y="216" text-anchor="middle" fill="white" font-size="18" font-weight="700">1</text><rect x="-20" y="260" width="210" height="126" rx="12" fill="#F0F4F8" stroke="#D9E2EC"/><text x="85" y="294" text-anchor="middle" class="label bold">CIFAR-10</text><text x="85" y="321" text-anchor="middle" class="label">DDPM / U-Net</text><text x="85" y="350" text-anchor="middle" class="small">32×32 · completed</text><path d="M392 210 H573" stroke="#9FB3C8" stroke-width="3" marker-end="url(#arrow)"/><circle cx="350" cy="210" r="31" fill="#F4A261"/><text x="350" y="216" text-anchor="middle" fill="white" font-size="18" font-weight="700">2</text><rect x="245" y="260" width="210" height="126" rx="12" fill="#F0F4F8" stroke="#D9E2EC"/><text x="350" y="294" text-anchor="middle" class="label bold">Tiny ImageNet</text><text x="350" y="321" text-anchor="middle" class="label">U-Net</text><text x="350" y="350" text-anchor="middle" class="small">64×64 · partial 150k / 400k</text><path d="M657 210 H838" stroke="#9FB3C8" stroke-width="3" marker-end="url(#arrow)"/><circle cx="615" cy="210" r="31" fill="#2A9D8F"/><text x="615" y="216" text-anchor="middle" fill="white" font-size="18" font-weight="700">3</text><rect x="510" y="260" width="210" height="126" rx="12" fill="#F0F4F8" stroke="#D9E2EC"/><text x="615" y="294" text-anchor="middle" class="label bold">Imagenette</text><text x="615" y="321" text-anchor="middle" class="label">Latent SiT + REPA</text><text x="615" y="350" text-anchor="middle" class="small">128×128 · cross-step</text><path d="M922 210 H1103" stroke="#9FB3C8" stroke-width="3" marker-end="url(#arrow)"/><circle cx="880" cy="210" r="31" fill="#2A9D8F"/><text x="880" y="216" text-anchor="middle" fill="white" font-size="18" font-weight="700">4</text><rect x="775" y="260" width="210" height="126" rx="12" fill="#F0F4F8" stroke="#D9E2EC"/><text x="880" y="294" text-anchor="middle" class="label bold">AFHQ Cats</text><text x="880" y="321" text-anchor="middle" class="label">SiT-B/2 + REPA</text><text x="880" y="350" text-anchor="middle" class="small">128×128 · quick-200</text><circle cx="1145" cy="210" r="31" fill="#2F855A"/><text x="1145" y="216" text-anchor="middle" fill="white" font-size="18" font-weight="700">5</text><rect x="1040" y="260" width="210" height="126" rx="12" fill="#F0F4F8" stroke="#D9E2EC"/><text x="1145" y="294" text-anchor="middle" class="label bold">Frozen result</text><text x="1145" y="321" text-anchor="middle" class="label">Early-stop REPA</text><text x="1145" y="350" text-anchor="middle" class="small">raw 20k · FID/KID winner</text><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#9FB3C8"/></marker></defs><rect x="70" y="430" width="1260" height="64" rx="10" fill="#FFF7ED"/><text x="95" y="458" class="label bold">Reading rule:</text><text x="95" y="480" class="small">Do not treat Tiny ImageNet as completed, Imagenette cross-step as a same-step ablation, or AFHQ quick-200 as full evaluation.</text></svg>